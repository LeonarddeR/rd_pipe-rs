name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: cargo fmt -- --check
        run: cargo fmt --all -- --check

  build:
    name: Build
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686-pc-windows-msvc
            suffix: x86
          - target: x86_64-pc-windows-msvc
            suffix: x64
          - target: aarch64-pc-windows-msvc
            suffix: arm64
          - target: arm64ec-pc-windows-msvc
            suffix: arm64ec

    steps:
      - uses: actions/checkout@v6

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build target
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rd_pipe-${{ matrix.suffix }}
          compression-level: 9
          path: |
            ./target/${{ matrix.target }}/release/*.dll*
            ./target/${{ matrix.target }}/release/*.lib
            ./target/${{ matrix.target }}/release/*.pdb

  combine-arm64x:
    name: Combine ARM64X
    runs-on: windows-2025
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup LLVM
        uses: aminya/setup-llvm@v1
        with:
          version: "22.1.0"

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: rd_pipe-arm64
          path: ./artifacts/arm64

      - name: Download ARM64EC artifacts
        uses: actions/download-artifact@v4
        with:
          name: rd_pipe-arm64ec
          path: ./artifacts/arm64ec

      - name: Combine into ARM64X
        shell: pwsh
        run: |
          # Find the static library files
          $arm64Lib = Get-ChildItem -Path ./artifacts/arm64 -Filter "*.lib" -Recurse | Select-Object -First 1
          $arm64ecLib = Get-ChildItem -Path ./artifacts/arm64ec -Filter "*.lib" -Recurse | Select-Object -First 1

          if (-not $arm64Lib) {
            Write-Error "ARM64 static library not found"
            exit 1
          }

          if (-not $arm64ecLib) {
            Write-Error "ARM64EC static library not found"
            exit 1
          }

          Write-Host "Found ARM64 lib: $($arm64Lib.FullName)"
          Write-Host "Found ARM64EC lib: $($arm64ecLib.FullName)"

          # Create output directory
          New-Item -ItemType Directory -Force -Path ./output/arm64x

          # Run the combination script
          .\create_arm64x.ps1 `
            -Arm64LibPath $arm64Lib.FullName `
            -Arm64EcLibPath $arm64ecLib.FullName `
            -OutputPath ./output/arm64x/rd_pipe.dll

      - name: Upload ARM64X artifact
        uses: actions/upload-artifact@v7
        with:
          name: rd_pipe-arm64x
          compression-level: 9
          path: ./output/arm64x/*
