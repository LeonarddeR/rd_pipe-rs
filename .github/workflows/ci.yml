name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: cargo fmt -- --check
        run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.name }})
    needs: [build, build-arm64x]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86
            target: i686-pc-windows-msvc
            runner: windows-2025
            artifact: rd_pipe-x86
          - name: x64
            target: x86_64-pc-windows-msvc
            runner: windows-2025
            artifact: rd_pipe-x64
          - name: arm64
            target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            artifact: rd_pipe-arm64
          - name: arm64ec
            target: arm64ec-pc-windows-msvc
            runner: windows-11-arm
            artifact: rd_pipe-arm64ec
          - name: arm64x-on-arm64
            target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            artifact: rd_pipe-arm64x
          - name: arm64x-on-arm64ec
            target: arm64ec-pc-windows-msvc
            runner: windows-11-arm
            artifact: rd_pipe-arm64x

    steps:
      - uses: actions/checkout@v6

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.name }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Download DLL artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dll

      - name: Run tests
        env:
          RD_PIPE_DLL_PATH: ${{ github.workspace }}/dll/rd_pipe.dll
        run: cargo nextest run --target ${{ matrix.target }} --profile ci

      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'target/nextest/ci/junit.xml'
          check_name: 'Tests (${{ matrix.name }})'
          detailed_summary: true
          include_passed: false
          annotate_only: false
          require_tests: true

  build:
    name: Build
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686-pc-windows-msvc
            suffix: x86
          - target: x86_64-pc-windows-msvc
            suffix: x64
          - target: aarch64-pc-windows-msvc
            suffix: arm64
          - target: arm64ec-pc-windows-msvc
            suffix: arm64ec

    steps:
      - uses: actions/checkout@v6

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        if: startsWith(github.ref, 'refs/tags/v')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: cargo set-version "${GITHUB_REF_NAME#v}"

      - name: Build target
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rd_pipe-${{ matrix.suffix }}
          compression-level: 9
          path: |
            ./target/${{ matrix.target }}/release/*.dll*
            ./target/${{ matrix.target }}/release/*.lib
            ./target/${{ matrix.target }}/release/*.pdb

  build-arm64x:
    name: Build ARM64X merged DLL
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v8
        with:
          name: rd_pipe-arm64
          path: artifacts/arm64

      - name: Download ARM64EC artifact
        uses: actions/download-artifact@v8
        with:
          name: rd_pipe-arm64ec
          path: artifacts/arm64ec

      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools

      - name: Build merged ARM64X DLL
        shell: pwsh
        run: |
          ./arm64x/build_merged.ps1 `
            -Arm64Lib   artifacts/arm64/rd_pipe.lib `
            -Arm64ecLib artifacts/arm64ec/rd_pipe.lib `
            -Arm64Dll   artifacts/arm64/rd_pipe.dll `
            -Arm64ecDll artifacts/arm64ec/rd_pipe.dll `
            -OutDir     artifacts/arm64x

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rd_pipe-arm64x
          compression-level: 9
          path: artifacts/arm64x/rd_pipe.dll

  release:
    name: Release
    needs: [build, build-arm64x]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble release tree
        run: |
          set -euo pipefail
          mkdir -p release
          for suffix in x86 x64 arm64 arm64ec arm64x; do
            src="artifacts/rd_pipe-${suffix}"
            if [ ! -d "$src" ]; then
              echo "Missing artifact: $src" >&2
              exit 1
            fi
            mv "$src" "release/${suffix}"
          done
          ls -R release

      - name: Create combined zip
        run: |
          cd release
          zip -r -9 "../rd_pipe-${GITHUB_REF_NAME}.zip" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rd_pipe-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          name: ${{ github.ref_name }}
