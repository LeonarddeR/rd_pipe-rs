# Source: https://nicolasiensen.github.io/2022-07-23-automating-dependency-updates-with-dependabot-github-auto-merge-and-github-actions/
name: Dependabot auto-merge
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  setup-dependabot-pr:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates of any dependencies
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-major' }}
        run: |
          gh pr comment $PR_URL --body "I'm **not approving** this PR because **it includes a major update of a dependency**"
          gh pr edit $PR_URL --add-label "requires-manual-qa"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  approve-after-checks:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'check_run' &&
      github.event.check_run.conclusion == 'success'
    steps:
      - name: Find PR for this commit
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.check_run.head_sha }}/pulls" \
            --jq '[.[] | select(.state == "open")] | first // empty')
          if [ -z "$PR_DATA" ]; then
            echo "No open PR found, skipping"
            exit 0
          fi
          echo "url=$(echo "$PR_DATA" | jq -r '.html_url // empty')" >> $GITHUB_OUTPUT
          echo "author=$(echo "$PR_DATA" | jq -r '.user.login // empty')" >> $GITHUB_OUTPUT
          echo "number=$(echo "$PR_DATA" | jq -r '.number // empty')" >> $GITHUB_OUTPUT
          echo "labels=$(echo "$PR_DATA" | jq -r '[.labels[].name] | join(",")')" >> $GITHUB_OUTPUT

      - name: Check all checks pass
        id: all-checks
        if: >-
          steps.find-pr.outputs.author == 'dependabot[bot]' &&
          !contains(steps.find-pr.outputs.labels, 'requires-manual-qa') &&
          steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALL_PASSED=$(gh pr checks ${{ steps.find-pr.outputs.number }} \
            --repo ${{ github.repository }} --json state \
            --jq 'all(.state == "SUCCESS" or .state == "SKIPPED" or .state == "NEUTRAL" or .state == "success")')
          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT

      - name: Approve patch and minor updates
        if: >-
          steps.find-pr.outputs.author == 'dependabot[bot]' &&
          !contains(steps.find-pr.outputs.labels, 'requires-manual-qa') &&
          steps.all-checks.outputs.all_passed == 'true'
        run: gh pr review "$PR_URL" --approve -b "I'm **approving** this pull request because **it includes a patch or minor update**"
        env:
          PR_URL: ${{ steps.find-pr.outputs.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
