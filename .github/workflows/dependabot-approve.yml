name: Dependabot approve
on:
  check_run:
    types: [completed]

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    if: github.event.check_run.conclusion == 'success'
    steps:
      - name: Find PR for this commit
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.check_run.head_sha }}/pulls" \
            --jq '[.[] | select(.state == "open")] | first // empty')
          if [ -z "$PR_DATA" ]; then
            echo "No open PR found, skipping"
            exit 0
          fi
          echo "url=$(echo "$PR_DATA" | jq -r '.html_url // empty')" >> $GITHUB_OUTPUT
          echo "author=$(echo "$PR_DATA" | jq -r '.user.login // empty')" >> $GITHUB_OUTPUT
          echo "number=$(echo "$PR_DATA" | jq -r '.number // empty')" >> $GITHUB_OUTPUT
          echo "labels=$(echo "$PR_DATA" | jq -r '[.labels[].name] | join(",")')" >> $GITHUB_OUTPUT

      - name: Check all checks pass
        id: all-checks
        if: >-
          steps.find-pr.outputs.author == 'dependabot[bot]' &&
          !contains(steps.find-pr.outputs.labels, 'requires-manual-qa') &&
          steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHECKS=$(gh pr checks ${{ steps.find-pr.outputs.number }} \
            --repo ${{ github.repository }} --json state)
          COUNT=$(echo "$CHECKS" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "all_passed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          ALL_PASSED=$(echo "$CHECKS" | jq 'all(.state == "SUCCESS" or .state == "SKIPPED" or .state == "NEUTRAL" or .state == "success")')
          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT

      - name: Approve patch and minor updates
        if: >-
          steps.find-pr.outputs.author == 'dependabot[bot]' &&
          !contains(steps.find-pr.outputs.labels, 'requires-manual-qa') &&
          steps.all-checks.outputs.all_passed == 'true'
        run: gh pr review "$PR_URL" --approve -b "I'm **approving** this pull request because **it includes a patch or minor update**"
        env:
          PR_URL: ${{ steps.find-pr.outputs.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
